name: Portfolio CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          set -e
          for page in index education projects hackathons achievements gallery contact; do
            test -f "${page}.html"
          done
          test -f css/style.css
          test -f js/main.js
          test -f js/layout.js
          test -f js/effects.js
          echo "All pages and assets present."

      - name: Check HTML structure
        run: |
          set -e
          grep -qi '<!DOCTYPE html>' index.html
          grep -qi '<html' index.html
          grep -qi '</html>' index.html
          grep -qi '<main' index.html
          echo "HTML structure looks valid."

      - name: Check asset links in HTML
        run: |
          set -e
          grep -q 'href="css/style.css"' index.html
          grep -q 'src="js/main.js"' index.html
          grep -qi 'Software Developer' index.html
          echo "Asset links and branding present."

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
